<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | DeepVision Forensic Lab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-branding">
            <h1>Welcome Back to the Control Center</h1>
            <p>Access your forensic dashboard, manage multimedia verifications, and review historical analysis reports.
            </p>
        </div>
        <div class="auth-form-panel">
            <div class="auth-card">
                <h2>Sign In</h2>

                {% if message %}
                <div class="error-alert">
                    <i class="fas fa-circle-exclamation"></i>
                    {{ message }}
                </div>
                {% endif %}

                <form action="/signin" method="POST">
                    <div class="form-group">
                        <label for="user">Username</label>
                        <input type="text" id="user" name="user" placeholder="Enter your username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Access Dashboard</button>

                    <div class="auth-footer">
                        Don't have an account? <a href="/logon">Create account</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
